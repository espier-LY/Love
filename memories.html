<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💝 回忆 🌙</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a3e">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet"></noscript>
    <style>
        :root {
            --primary-pink: #ff6b9d;
            --soft-pink: #ffc2d4;
            --deep-purple: #1a1a3e;
            --night-blue: #0f0f2d;
            --glow-pink: rgba(255, 107, 157, 0.6);
            --glow-purple: rgba(147, 112, 219, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #0f0f2d 0%, #1a1a3e 30%, #2d1b4e 60%, #1a1a3e 100%);
            overflow: hidden;
            position: relative;
        }

        /* 星空背景 */
        .starry-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: #fff8e7;
            border-radius: 50%;
            will-change: opacity, transform;
        }

        @media screen and (min-width: 769px) {
            .star {
                animation: twinkle var(--duration) ease-in-out infinite;
                animation-delay: var(--delay);
            }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 魔法光晕 */
        .magic-aura {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 107, 157, 0.25) 0%, rgba(147, 112, 219, 0.15) 50%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
            animation: auraBreath 5s ease-in-out infinite;
        }

        @keyframes auraBreath {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 标题 */
        .title {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: white;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 30px var(--glow-pink), 0 0 60px rgba(255, 107, 157, 0.5);
            animation: fadeInUp 1s ease forwards;
            z-index: 20;
            position: relative;
        }

        .subtitle {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            color: var(--soft-pink);
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 15px var(--glow-purple);
            animation: fadeInUp 1s ease forwards;
            animation-delay: 0.3s;
            opacity: 0;
            z-index: 20;
            position: relative;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 3D画布容器 */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: max(20px, env(safe-area-inset-top));
            left: 20px;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: 500;
            color: white;
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.7), rgba(155, 127, 205, 0.7));
            border: none;
            border-radius: 50px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px var(--glow-purple);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--glow-pink);
        }

        .back-btn:active {
            transform: scale(0.97);
        }

        /* 提示文字 */
        .hint {
            position: fixed;
            bottom: max(30px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            z-index: 100;
            animation: fadeInUp 1s ease forwards;
            animation-delay: 1s;
            opacity: 0;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        @media screen and (max-width: 768px) {
            .magic-aura {
                width: 250px;
                height: 250px;
            }

            .back-btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="starry-bg" id="starry-bg"></div>

    <!-- 魔法光晕 -->
    <div class="magic-aura"></div>

    <!-- 3D画布 -->
    <div id="canvas-container"></div>

    <!-- 返回按钮 -->
    <a href="index.html" class="back-btn">← 返回</a>

    <!-- 标题 -->
    <div class="container">
        <h1 class="title">💝 我们的回忆 💝</h1>
        <p class="subtitle">拖动屏幕旋转爱心</p>
    </div>

    <!-- 提示 -->
    <p class="hint">✨ 用指尖感受这份心意 ✨</p>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        /* ============================================
           🌟 配置
           ============================================ */
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;

        const CONFIG = {
            particleCount: isMobile ? 1500 : 2500,
            particleSize: isMobile ? 3 : 2.5,
            heartScale: isMobile ? 4 : 6,
            rotationSpeed: 0.003
        };

        /* ============================================
           🌌 创建星空
           ============================================ */
        function createStars() {
            const container = document.getElementById('starry-bg');
            const starCount = isMobile ? 60 : 100;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 1;
                star.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    --duration: ${Math.random() * 3 + 2}s;
                    --delay: ${Math.random() * 3}s;
                `;
                container.appendChild(star);
            }
        }

        /* ============================================
           💝 Three.js 3D 粒子爱心
           ============================================ */
        let scene, camera, renderer, particles, heartPoints = [];
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let targetRotation = { x: 0, y: 0 };
        let currentRotation = { x: 0, y: 0 };
        let autoRotate = true;
        let autoRotateTimeout;

        function init() {
            createStars();

            // 场景
            scene = new THREE.Scene();

            // 相机 - 调整参数让爱心完整显示
            const isMobileDevice = isMobile || window.innerWidth < 768;
            camera = new THREE.PerspectiveCamera(
                isMobileDevice ? 60 : 50,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.z = isMobileDevice ? 80 : 100;

            // 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 生成爱心点
            generateHeartPoints();

            // 创建粒子系统
            createParticles();

            // 事件监听
            setupEventListeners();

            // 开始动画
            animate();
        }

        // 生成爱心形状的点
        function generateHeartPoints() {
            heartPoints = [];
            const scale = CONFIG.heartScale;

            // 爱心参数方程
            for (let i = 0; i < CONFIG.particleCount; i++) {
                // 使用爱心曲面的参数方程
                const u = Math.random() * Math.PI * 2;
                const v = Math.random() * Math.PI * 2;

                // 爱心形状公式
                const x = 16 * Math.pow(Math.sin(u), 3);
                const y = 13 * Math.cos(u) - 5 * Math.cos(2 * u) - 2 * Math.cos(3 * u) - Math.cos(4 * u);
                const z = (Math.random() - 0.5) * 8 * (1 + Math.sin(v) * 0.5);

                // 添加一些随机性让它更像粒子效果
                const noiseX = (Math.random() - 0.5) * 2;
                const noiseY = (Math.random() - 0.5) * 2;
                const noiseZ = (Math.random() - 0.5) * 2;

                heartPoints.push({
                    x: (x + noiseX) * scale * 0.5,
                    y: (y + noiseY) * scale * 0.5,
                    z: (z + noiseZ) * scale * 0.3
                });
            }
        }

        // 创建粒子系统
        function createParticles() {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(CONFIG.particleCount * 3);
            const colors = new Float32Array(CONFIG.particleCount * 3);

            const colorPalette = [
                new THREE.Color(0xff6b9d), // 粉红
                new THREE.Color(0xff8a80), // 浅粉
                new THREE.Color(0xff4778), // 深粉
                new THREE.Color(0xffc2d4), // 淡粉
                new THREE.Color(0xff69b4), // 热粉
                new THREE.Color(0xffb6c1), // 浅粉红
            ];

            for (let i = 0; i < CONFIG.particleCount; i++) {
                const point = heartPoints[i];
                positions[i * 3] = point.x;
                positions[i * 3 + 1] = point.y;
                positions[i * 3 + 2] = point.z;

                // 随机颜色
                const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            // 材质
            const material = new THREE.PointsMaterial({
                size: CONFIG.particleSize,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                sizeAttenuation: true,
                blending: THREE.AdditiveBlending
            });

            // 粒子系统
            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        // 事件监听
        function setupEventListeners() {
            const canvas = renderer.domElement;

            // 鼠标事件
            canvas.addEventListener('mousedown', onDragStart);
            canvas.addEventListener('mousemove', onDragMove);
            canvas.addEventListener('mouseup', onDragEnd);
            canvas.addEventListener('mouseleave', onDragEnd);

            // 触摸事件
            canvas.addEventListener('touchstart', onTouchStart, { passive: false });
            canvas.addEventListener('touchmove', onTouchMove, { passive: false });
            canvas.addEventListener('touchend', onDragEnd);

            // 窗口大小改变
            window.addEventListener('resize', onWindowResize);
        }

        function onDragStart(e) {
            isDragging = true;
            autoRotate = false;
            clearTimeout(autoRotateTimeout);
            previousMousePosition = {
                x: e.clientX,
                y: e.clientY
            };
        }

        function onDragMove(e) {
            if (!isDragging) return;

            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;

            targetRotation.y += deltaX * CONFIG.rotationSpeed;
            targetRotation.x += deltaY * CONFIG.rotationSpeed;

            // 限制X轴旋转范围
            targetRotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotation.x));

            previousMousePosition = {
                x: e.clientX,
                y: e.clientY
            };
        }

        function onDragEnd() {
            isDragging = false;

            // 3秒后恢复自动旋转
            autoRotateTimeout = setTimeout(() => {
                autoRotate = true;
            }, 3000);
        }

        function onTouchStart(e) {
            if (e.touches.length === 1) {
                e.preventDefault();
                isDragging = true;
                autoRotate = false;
                clearTimeout(autoRotateTimeout);
                previousMousePosition = {
                    x: e.touches[0].clientX,
                    y: e.touches[0].clientY
                };
            }
        }

        function onTouchMove(e) {
            if (!isDragging || e.touches.length !== 1) return;
            e.preventDefault();

            const deltaX = e.touches[0].clientX - previousMousePosition.x;
            const deltaY = e.touches[0].clientY - previousMousePosition.y;

            targetRotation.y += deltaX * CONFIG.rotationSpeed;
            targetRotation.x += deltaY * CONFIG.rotationSpeed;

            targetRotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotation.x));

            previousMousePosition = {
                x: e.touches[0].clientX,
                y: e.touches[0].clientY
            };
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);

            // 自动旋转
            if (autoRotate) {
                targetRotation.y += 0.005;
            }

            // 平滑插值
            currentRotation.x += (targetRotation.x - currentRotation.x) * 0.08;
            currentRotation.y += (targetRotation.y - currentRotation.y) * 0.08;

            // 应用旋转
            particles.rotation.x = currentRotation.x;
            particles.rotation.y = currentRotation.y;

            // 轻微上下浮动
            particles.position.y = Math.sin(Date.now() * 0.001) * 2;

            renderer.render(scene, camera);
        }

        // 启动
        init();
    </script>
</body>
</html>
