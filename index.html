<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💗 给你的悄悄话 💗</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a3e">
    <!-- 异步加载字体，不阻塞渲染 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet"></noscript>
    <style>
        /* ============================================
           🌟 全局样式 & CSS 变量
           ============================================ */
        :root {
            --primary-pink: #ff6b9d;
            --soft-pink: #ffc2d4;
            --deep-purple: #1a1a3e;
            --night-blue: #0f0f2d;
            --star-white: #fff8e7;
            --glow-pink: rgba(255, 107, 157, 0.6);
            --glow-purple: rgba(147, 112, 219, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Noto Sans SC', 'Mochiy Pop One', sans-serif;
            background: linear-gradient(135deg, #0f0f2d 0%, #1a1a3e 30%, #2d1b4e 60%, #1a1a3e 100%);
            overflow-x: hidden;
            position: relative;
        }

        /* ============================================
           🌌 星空背景
           ============================================ */
        .starry-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: var(--star-white);
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
            will-change: opacity, transform;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* ============================================
           💫 浮动爱心
           ============================================ */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            bottom: -50px;
            font-size: var(--size);
            animation: floatUp var(--duration) linear infinite;
            animation-delay: var(--delay);
            opacity: 0.6;
            will-change: transform, opacity;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 0;
            }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% {
                transform: translateY(-110vh) rotate(360deg) scale(0.5);
                opacity: 0;
            }
        }

        /* ============================================
           🎆 爱心粒子爆炸画布
           ============================================ */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            contain: strict;
        }

        /* ============================================
           🌸 主容器
           ============================================ */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: all 1s ease;
        }

        .container.brightened {
            background: radial-gradient(ellipse at center, rgba(255, 182, 193, 0.15) 0%, transparent 70%);
        }

        /* ============================================
           📝 开场文字 & 按钮容器
           ============================================ */
        .intro-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .intro-text {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            color: var(--soft-pink);
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 0 20px var(--glow-pink);
            animation: fadeInUp 1s ease forwards;
            opacity: 0;
            animation-delay: 0.5s;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ============================================
           💗 主按钮
           ============================================ */
         .main-btn {
            padding: 18px 45px;
            font-size: 1.3rem;
            font-weight: 500;
            color: white;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8a80 50%, #ff6b9d 100%);
            background-size: 200% 200%;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow:
                0 0 30px var(--glow-pink),
                0 0 60px rgba(255, 107, 157, 0.3),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
            animation: fadeInUp 1s ease forwards, pulse-glow 2s ease-in-out infinite;
            animation-delay: 0.8s, 1.8s;
            opacity: 0;
        }

        .main-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255, 255, 255, 0.3) 50%,
                transparent 70%
            );
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .main-btn:hover {
            transform: scale(1.1);
            box-shadow:
                0 0 50px var(--glow-pink),
                0 0 100px rgba(255, 107, 157, 0.4),
                inset 0 0 30px rgba(255, 255, 255, 0.3);
            background-position: 100% 100%;
        }

        .main-btn:hover::before {
            transform: translateX(100%);
        }

        .main-btn:active {
            transform: scale(0.95);
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 30px var(--glow-pink), 0 0 60px rgba(255, 107, 157, 0.3); }
            50% { box-shadow: 0 0 50px var(--glow-pink), 0 0 80px rgba(255, 107, 157, 0.5); }
        }

        /* ============================================
           💌 打字机文字区域
           ============================================ */
        .typewriter-container {
            text-align: center;
            margin: 30px 0;
            min-height: 400px;
        }

        .typewriter-text {
            font-size: clamp(1.3rem, 4vw, 2rem);
            color: white;
            text-shadow: 0 0 15px var(--glow-purple);
            margin: 15px 0;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .typewriter-text.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: var(--soft-pink);
            margin-left: 5px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* ============================================
           ❤️ 大爱心 & 表白核心区
           ============================================ */
        .confession-area {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeInUp 1s ease forwards;
        }

        .confession-area.visible {
            display: flex;
        }

        .big-heart {
            font-size: clamp(80px, 20vw, 150px);
            animation: heartbeat 1.2s ease-in-out infinite;
            filter: drop-shadow(0 0 30px var(--glow-pink));
            cursor: default;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.25); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }

        .confession-text {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: white;
            margin: 25px 0;
            text-shadow:
                0 0 20px var(--glow-pink),
                0 0 40px rgba(255, 107, 157, 0.4);
            text-align: center;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .answer-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 500;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .btn-yes {
            color: white;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff4778 100%);
            box-shadow:
                0 0 25px var(--glow-pink),
                0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-yes:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow:
                0 0 40px var(--glow-pink),
                0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .btn-think {
            color: white;
            background: linear-gradient(135deg, #9b7fcd 0%, #7a5fc9 100%);
            box-shadow:
                0 0 25px var(--glow-purple),
                0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-think:hover {
            transform: scale(1.05);
        }

        .btn-think.disappearing {
            animation: btnDisappear 0.8s ease-out forwards;
        }

        @keyframes btnDisappear {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            30% {
                transform: scale(1.2);
                opacity: 1;
            }
            100% {
                transform: scale(0) rotate(360deg);
                opacity: 0;
            }
        }

        /* ============================================
           🎉 最终成功页面
           ============================================ */
        .final-area {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: transparent;
            border: none;
            outline: none;
            box-shadow: none;
        }

        .final-heart-rain {
            background: transparent;
            border: none;
        }

        .final-area.visible {
            display: flex;
            animation: fadeInUp 1.5s ease forwards;
        }

        .final-heart-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            overflow: hidden;
        }

        .falling-heart {
            position: absolute;
            top: -50px;
            font-size: var(--size);
            animation: fallHeart var(--duration) linear infinite;
            animation-delay: var(--delay);
            will-change: transform, opacity;
        }

        @keyframes fallHeart {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0.3;
            }
        }

        .final-text {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: white;
            margin: 30px 0;
            text-shadow:
                0 0 30px var(--glow-pink),
                0 0 60px rgba(255, 107, 157, 0.5);
            animation: glow-pulse 2s ease-in-out infinite;
            z-index: 60;
            position: relative;
        }

        @keyframes glow-pulse {
            0%, 100% { text-shadow: 0 0 30px var(--glow-pink), 0 0 60px rgba(255, 107, 157, 0.5); }
            50% { text-shadow: 0 0 50px var(--glow-pink), 0 0 100px rgba(255, 107, 157, 0.7); }
        }

        /* ============================================
           💝 回忆按钮
           ============================================ */
        .memories-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: 500;
            color: white;
            background: linear-gradient(135deg, rgba(155, 127, 205, 0.8) 0%, rgba(147, 112, 219, 0.8) 100%);
            border: none;
            border-radius: 50px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow:
                0 0 20px var(--glow-purple),
                0 5px 20px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 60;
            animation: fadeInUp 1s ease forwards;
            animation-delay: 0.5s;
            opacity: 0;
        }

        .memories-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow:
                0 0 30px var(--glow-purple),
                0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .memories-btn:active {
            transform: scale(0.98);
        }

        /* ============================================
           🎵 音乐控制按钮
           ============================================ */
        .music-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.6), rgba(155, 127, 205, 0.6));
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 0 20px var(--glow-purple);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .music-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px var(--glow-pink);
        }

        .music-toggle.playing {
            animation: musicPulse 1s ease-in-out infinite;
        }

        @keyframes musicPulse {
            0%, 100% { box-shadow: 0 0 20px var(--glow-purple); }
            50% { box-shadow: 0 0 35px var(--glow-pink); }
        }

        /* ============================================
           ✨ 魔法光晕效果
           ============================================ */
        .magic-aura {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 107, 157, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            animation: auraBreath 4s ease-in-out infinite;
        }

        @keyframes auraBreath {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.7; }
        }

        /* ============================================
           🎀 隐藏元素
           ============================================ */
        .hidden {
            display: none !important;
        }

        /* memories-area 的 hidden 需要特殊处理 */
        .memories-area.hidden {
            display: none !important;
        }

        .invisible {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* ============================================
           📱 移动端适配
           ============================================ */
        @media screen and (max-width: 768px) {
            body {
                min-height: 100vh;
                min-height: 100dvh;
                overflow-x: hidden;
                -webkit-overflow-scrolling: touch;
            }

            .container {
                padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }

            /* 主按钮 - 更大更易触摸 */
            .main-btn {
                padding: 20px 50px;
                font-size: 1.4rem;
                min-width: 200px;
                touch-action: manipulation;
            }

            /* 开场文字 */
            .intro-text {
                margin-bottom: 50px;
                padding: 0 20px;
                line-height: 1.8;
            }

            /* 打字机文字 */
            .typewriter-text {
                padding: 0 20px;
                line-height: 1.8;
                margin: 10px 0;
            }

            .typewriter-container {
                min-height: 350px;
            }

            /* 大爱心 */
            .big-heart {
                font-size: clamp(70px, 25vw, 120px);
            }

            /* 表白文字 */
            .confession-text {
                padding: 0 25px;
                line-height: 1.8;
            }

            /* 按钮组 - 垂直排列更易点击 */
            .btn-group {
                flex-direction: column;
                gap: 20px;
                width: 100%;
                padding: 0 30px;
            }

            .answer-btn {
                width: 100%;
                padding: 18px 30px;
                font-size: 1.3rem;
                min-height: 56px;
                touch-action: manipulation;
            }

            .btn-think {
                position: static !important;
                left: auto !important;
                top: auto !important;
            }

            /* 最终文字 */
            .final-text {
                padding: 0 25px;
                line-height: 1.8;
            }

            /* 回忆按钮 */
            .memories-btn {
                padding: 16px 30px;
                font-size: 1rem;
                margin-top: 25px;
                touch-action: manipulation;
            }

            /* 音乐按钮 - 更大更好点 */
            .music-toggle {
                width: 56px;
                height: 56px;
                font-size: 1.5rem;
                bottom: max(25px, env(safe-area-inset-bottom));
                right: 20px;
            }

            /* 浮动爱心减少一些避免性能问题 */
            .floating-heart {
                --duration: 15s;
                opacity: 0.4;
            }

            /* 打字机光标适配 */
            .cursor {
                height: 1.4em;
            }

            /* 简化主按钮动画 */
            .main-btn {
                animation: fadeInUp 1s ease forwards;
            }

            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(30px); }
                to { opacity: 1; transform: translateY(0); }
            }

            /* 魔法光晕简化 */
            .magic-aura {
                width: 200px;
                height: 200px;
                animation: none;
                opacity: 0.4;
            }
        }

        /* ============================================
           📱 小屏手机进一步优化
           ============================================ */
        @media screen and (max-width: 375px) {
            .main-btn {
                padding: 18px 40px;
                font-size: 1.2rem;
            }

            .confession-text {
                font-size: 1.3rem;
            }

            .btn-group {
                padding: 0 20px;
                gap: 15px;
            }

            .answer-btn {
                padding: 15px 25px;
                font-size: 1.2rem;
            }

            /* 星星动画完全禁用 */
            .star {
                animation: none;
                opacity: 0.6;
            }
        }

        /* ============================================
           📱 防止iOS双击缩放
           ============================================ */
        @media (hover: none) and (pointer: coarse) {
            .main-btn:active,
            .answer-btn:active {
                transform: scale(0.97);
            }
        }

        /* ============================================
           💝 3D回忆页面样式
           ============================================ */
        .memories-area {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, #0f0f2d 0%, #1a1a3e 30%, #2d1b4e 60%, #1a1a3e 100%);
        }

        .memories-area.visible {
            display: flex !important;
        }

        .memories-title {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: white;
            text-align: center;
            text-shadow: 0 0 30px var(--glow-pink), 0 0 60px rgba(255, 107, 157, 0.5);
            z-index: 210;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            white-space: nowrap;
        }

        @media screen and (max-width: 768px) {
            .memories-title {
                top: 45%;
                transform: translate(-50%, -50%);
                white-space: nowrap;
            }
        }

        #memories-canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 205;
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="starry-bg" id="starry-bg"></div>

    <!-- 浮动爱心背景 -->
    <div class="floating-hearts" id="floating-hearts"></div>

    <!-- 魔法光晕 -->
    <div class="magic-aura"></div>

    <!-- 粒子爆炸画布 -->
    <canvas id="particle-canvas"></canvas>

    <!-- 主容器 -->
    <div class="container" id="main-container">
        <!-- 开场页面 -->
        <div class="intro-stage" id="intro-stage">
            <p class="intro-text">我有一件很重要的事想告诉你…</p>
            <button class="main-btn" id="main-btn">点我一下 💗</button>
        </div>

        <!-- 打字机文字区域 -->
        <div class="typewriter-container hidden" id="typewriter-container">
            <p class="typewriter-text" data-index="0"></p>
            <p class="typewriter-text" data-index="1"></p>
            <p class="typewriter-text" data-index="2"></p>
            <p class="typewriter-text" data-index="3"></p>
            <p class="typewriter-text" data-index="4"></p>
            <p class="typewriter-text" data-index="5"></p>
            <p class="typewriter-text" data-index="6"></p>
        </div>

        <!-- 表白核心区域 -->
        <div class="confession-area" id="confession-area">
            <div class="big-heart">💖</div>
            <p class="confession-text">你愿意做我的唯一吗？</p>
            <div class="btn-group">
                <button class="answer-btn btn-yes" id="btn-yes">愿意 💖</button>
                <button class="answer-btn btn-think" id="btn-think">再想想 😏</button>
            </div>
        </div>

        <!-- 最终成功页面 -->
        <div class="final-area" id="final-area">
            <div class="final-heart-rain" id="final-heart-rain"></div>
            <div class="big-heart" style="animation-delay: 0s;">💝</div>
            <p class="final-text">以后也想一直陪着你</p>
            <button class="memories-btn" id="memories-btn">探索回忆日常 💫</button>
        </div>

        <!-- 3D回忆页面 -->
        <div class="memories-area hidden" id="memories-area">
            <h1 class="memories-title">💝 我们的回忆 💝</h1>
            <div id="memories-canvas-container"></div>
        </div>
    </div>

    <!-- 音乐控制 -->
    <button class="music-toggle" id="music-toggle" title="背景音乐">🎵</button>

    <!-- 背景音乐 (使用免费音乐URL) -->
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        /* ============================================
           🌟 配置 & 状态
           ============================================ */
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
        const isLowEndMobile = isMobile && navigator.hardwareConcurrency <= 4;

        const CONFIG = {
            starCount: isLowEndMobile ? 40 : (isMobile ? 60 : 150),
            floatingHeartCount: isMobile ? 5 : 12,
            particleCount: isLowEndMobile ? 25 : (isMobile ? 35 : 60),
            useEmojiParticles: isMobile,
            typingSpeed: isMobile ? 100 : 80,
            phrases: [
                '老婆',
                '遇见你之后',
                '我的世界开始变得不一样了',
                '我开始期待每一天',
                '开始珍惜每一次与你见面的时间',
                '我总是很开心',
                '因为我拥有全天下最好的老婆'
            ]
        };

        let state = {
            stage: 0, // 0: intro, 1: typing, 2: confession, 3: final, 4: memories
            musicPlaying: false
        };

        // Three.js variables for memories
        let memoriesScene, memoriesCamera, memoriesRenderer, memoriesParticles, memoriesHeartPoints = [];
        let memoriesIsDragging = false;
        let memoriesPreviousMousePosition = { x: 0, y: 0 };
        let memoriesTargetRotation = { x: 0, y: 0 };
        let memoriesCurrentRotation = { x: 0, y: 0 };
        let memoriesAutoRotate = true;
        let memoriesAutoRotateTimeout;

        /* ============================================
           🌌 创建星空
           ============================================ */
        function createStars() {
            const container = document.getElementById('starry-bg');
            for (let i = 0; i < CONFIG.starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    --duration: ${Math.random() * 3 + 2}s;
                    --delay: ${Math.random() * 3}s;
                `;
                container.appendChild(star);
            }
        }

        /* ============================================
           💕 创建浮动爱心
           ============================================ */
        function createFloatingHearts() {
            const container = document.getElementById('floating-hearts');
            const hearts = ['💕', '💗', '💖', '💝', '✨', '🌸'];

            for (let i = 0; i < CONFIG.floatingHeartCount; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.cssText = `
                    left: ${Math.random() * 100}%;
                    --size: ${Math.random() * 20 + 15}px;
                    --duration: ${Math.random() * 8 + 6}s;
                    --delay: ${Math.random() * 10}s;
                `;
                container.appendChild(heart);
            }
        }

        /* ============================================
           🎆 爱心粒子爆炸效果 (移动端优化版)
           ============================================ */
        class HeartParticleExplosion {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.particles = [];
                this.elements = [];
                this.init(x, y);

                if (CONFIG.useEmojiParticles) {
                    this.animateEmoji();
                } else {
                    this.animateCanvas();
                }
            }

            init(x, y) {
                const hearts = ['💖', '💕', '💗', '💝', '✨', '🌸', '💜', '🩷'];
                for (let i = 0; i < CONFIG.particleCount; i++) {
                    const angle = (Math.PI * 2 / CONFIG.particleCount) * i + Math.random() * 0.5;
                    const speed = Math.random() * 6 + 3;
                    const size = Math.random() * 12 + 8;
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 2,
                        size: size,
                        alpha: 1,
                        decay: Math.random() * 0.02 + 0.015,
                        rotation: 0,
                        rotationSpeed: (Math.random() - 0.5) * 0.3,
                        emoji: hearts[Math.floor(Math.random() * hearts.length)]
                    });
                }
            }

            animateEmoji() {
                const container = document.getElementById('particle-canvas');

                this.particles.forEach(p => {
                    const el = document.createElement('div');
                    el.textContent = p.emoji;
                    el.style.cssText = `
                        position: fixed;
                        left: ${p.x}px;
                        top: ${p.y}px;
                        font-size: ${p.size}px;
                        pointer-events: none;
                        z-index: 101;
                        opacity: 1;
                        will-change: transform, opacity;
                    `;
                    container.appendChild(el);
                    this.elements.push({ el, p });
                });

                let frame = 0;
                const maxFrames = 80;

                const animate = () => {
                    frame++;
                    let alive = false;

                    this.elements.forEach(({ el, p }) => {
                        if (p.alpha <= 0) return;
                        alive = true;

                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += 0.15;
                        p.alpha -= p.decay;
                        p.rotation += p.rotationSpeed;

                        el.style.transform = `translate(${p.x - parseFloat(el.style.left)}px, ${p.y - parseFloat(el.style.top)}px) rotate(${p.rotation}rad)`;
                        el.style.opacity = p.alpha;
                    });

                    if (alive && frame < maxFrames) {
                        requestAnimationFrame(animate);
                    } else {
                        this.elements.forEach(({ el }) => el.remove());
                    }
                };

                requestAnimationFrame(animate);
            }

            animateCanvas() {
                const canvas = document.getElementById('particle-canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                let aliveCount = 0;
                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    aliveCount = 0;
                    this.particles.forEach(p => {
                        if (p.alpha <= 0) return;
                        aliveCount++;

                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += 0.12;
                        p.alpha -= p.decay;
                        p.rotation += p.rotationSpeed;

                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.rotation);
                        ctx.globalAlpha = p.alpha;
                        ctx.fillStyle = p.emoji;
                        ctx.font = `${p.size}px sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(p.emoji, 0, 0);
                        ctx.restore();
                    });

                    if (aliveCount > 0) {
                        requestAnimationFrame(animate);
                    } else {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    }
                };

                requestAnimationFrame(animate);
            }
        }

        /* ============================================
           ✍️ 打字机效果
           ============================================ */
        async function typeWriter(element, text) {
            element.classList.add('visible');
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            element.appendChild(cursor);

            for (let i = 0; i < text.length; i++) {
                const char = document.createTextNode(text[i]);
                element.insertBefore(char, cursor);
                await new Promise(resolve => setTimeout(resolve, CONFIG.typingSpeed));
            }

            setTimeout(() => cursor.remove(), 1000);
        }

        async function showTypewriterSequence() {
            const container = document.getElementById('typewriter-container');
            container.classList.remove('hidden');
            const texts = container.querySelectorAll('.typewriter-text');

            for (let i = 0; i < CONFIG.phrases.length; i++) {
                await new Promise(resolve => setTimeout(resolve, 500));
                await typeWriter(texts[i], CONFIG.phrases[i]);
                await new Promise(resolve => setTimeout(resolve, 800));
            }
        }

        /* ============================================
           🎉 最终爱心飘落
           ============================================ */
        function createFinalHeartRain() {
            const container = document.getElementById('final-heart-rain');
            const hearts = ['💖', '💕', '💗', '💝', '💘', '❤️', '🥰', '😍', '🤍', '💜'];
            const count = isMobile ? 25 : 50;

            for (let i = 0; i < count; i++) {
                const heart = document.createElement('div');
                heart.className = 'falling-heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.cssText = `
                    left: ${Math.random() * 100}%;
                    --size: ${Math.random() * 25 + 15}px;
                    --duration: ${Math.random() * 4 + 3}s;
                    --delay: ${Math.random() * 5}s;
                `;
                container.appendChild(heart);
            }
        }

        /* ============================================
           🎵 音乐控制
           ============================================ */
        function toggleMusic() {
            const audio = document.getElementById('bg-music');
            const btn = document.getElementById('music-toggle');

            if (state.musicPlaying) {
                audio.pause();
                btn.classList.remove('playing');
                btn.textContent = '🎵';
            } else {
                audio.play().catch(() => {});
                btn.classList.add('playing');
                btn.textContent = '🔊';
            }
            state.musicPlaying = !state.musicPlaying;
        }

        /* ============================================
           💫 "再想想"按钮消失效果
           ============================================ */
        function setupThinkButton() {
            const btn = document.getElementById('btn-think');

            // 鼠标靠近时还是保持调皮效果（左右晃动）
            btn.addEventListener('mouseenter', () => {
                if (state.stage !== 2) return;
                btn.style.transform = 'translateX(' + (Math.random() * 20 - 10) + 'px)';
            });

            btn.addEventListener('mouseleave', () => {
                if (state.stage !== 2) return;
                btn.style.transform = '';
            });

            // 点击触发消失效果
            btn.addEventListener('click', (e) => {
                if (state.stage !== 2) return;
                e.preventDefault();

                // 触发小爱心爆炸
                const rect = btn.getBoundingClientRect();
                triggerMiniExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2);

                // 添加消失动画
                btn.classList.add('disappearing');

                // 动画结束后隐藏按钮
                btn.addEventListener('animationend', () => {
                    btn.style.display = 'none';
                }, { once: true });
            });
        }

        // 小型爱心爆炸效果
        function triggerMiniExplosion(x, y) {
            const container = document.getElementById('particle-canvas');
            const hearts = ['💭', '💗', '✨', '🩷', '💕'];
            const particles = [];

            for (let i = 0; i < 12; i++) {
                const el = document.createElement('div');
                el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                el.style.cssText = `
                    position: fixed;
                    left: ${x}px;
                    top: ${y}px;
                    font-size: ${Math.random() * 10 + 12}px;
                    pointer-events: none;
                    z-index: 102;
                    opacity: 1;
                `;
                container.appendChild(el);

                const angle = (Math.PI * 2 / 12) * i + Math.random() * 0.5;
                const speed = Math.random() * 3 + 2;
                particles.push({
                    el,
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 1,
                    alpha: 1,
                    decay: 0.025
                });
            }

            let frame = 0;
            const animate = () => {
                frame++;
                let alive = false;

                particles.forEach(p => {
                    if (p.alpha <= 0) return;
                    alive = true;

                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1;
                    p.alpha -= p.decay;

                    p.el.style.transform = `translate(${p.x - x}px, ${p.y - y}px)`;
                    p.el.style.opacity = p.alpha;
                });

                if (alive && frame < 60) {
                    requestAnimationFrame(animate);
                } else {
                    particles.forEach(p => p.el.remove());
                }
            };

            requestAnimationFrame(animate);
        }

        /* ============================================
           🚀 主按钮点击 - 进入第二阶段
           ============================================ */
        function setupMainButton() {
            const btn = document.getElementById('main-btn');

            btn.addEventListener('click', (e) => {
                if (state.stage !== 0) return;
                state.stage = 1;

                // 获取按钮位置触发粒子爆炸
                const rect = btn.getBoundingClientRect();
                new HeartParticleExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2);

                // 按钮消失
                btn.classList.add('invisible');

                // 页面变亮
                document.getElementById('main-container').classList.add('brightened');

                // 开始打字机序列
                setTimeout(() => {
                    showTypewriterSequence().then(() => {
                        // 打字完成后显示表白区
                        setTimeout(() => {
                            state.stage = 2;
                            document.getElementById('typewriter-container').classList.add('hidden');
                            document.getElementById('confession-area').classList.add('visible');
                        }, 1500);
                    });
                }, 300);
            });
        }

        /* ============================================
           💖 愿意按钮
           ============================================ */
        function setupYesButton() {
            const btn = document.getElementById('btn-yes');

            btn.addEventListener('click', () => {
                if (state.stage !== 2) return;
                state.stage = 3;

                // 触发爱心爆炸
                const rect = btn.getBoundingClientRect();
                new HeartParticleExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2);

                // 隐藏表白区
                document.getElementById('confession-area').classList.remove('visible');

                // 创建最终爱心雨
                createFinalHeartRain();

                // 显示最终页面
                setTimeout(() => {
                    document.getElementById('final-area').classList.add('visible');
                    // 增强背景光晕
                    document.querySelector('.magic-aura').style.animation = 'auraBreath 2s ease-in-out infinite';
                    document.querySelector('.magic-aura').style.background = 'radial-gradient(circle, rgba(255, 107, 157, 0.5) 0%, transparent 70%)';
                }, 500);
            });
        }

        /* ============================================
           💝 回忆按钮 - 进入3D爱心页面
           ============================================ */
        function setupMemoriesButton() {
            const btn = document.getElementById('memories-btn');
            const memoriesArea = document.getElementById('memories-area');

            btn.addEventListener('click', () => {
                state.stage = 4;
                memoriesArea.classList.add('visible');
                initMemories3D();
            });
        }

        /* ============================================
           💝 Three.js 3D 粒子爱心
           ============================================ */
        function initMemories3D() {
            const container = document.getElementById('memories-canvas-container');
            const particleCount = isMobile ? 1500 : 2500;
            const heartScale = isMobile ? 4 : 6;

            // 场景
            memoriesScene = new THREE.Scene();

            // 相机
            const isMobileDevice = isMobile || window.innerWidth < 768;
            memoriesCamera = new THREE.PerspectiveCamera(
                isMobileDevice ? 60 : 50,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            memoriesCamera.position.z = isMobileDevice ? 80 : 100;

            // 渲染器
            memoriesRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            memoriesRenderer.setSize(window.innerWidth, window.innerHeight);
            memoriesRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(memoriesRenderer.domElement);

            // 生成爱心点
            memoriesHeartPoints = [];
            for (let i = 0; i < particleCount; i++) {
                const u = Math.random() * Math.PI * 2;
                const v = Math.random() * Math.PI * 2;

                const x = 16 * Math.pow(Math.sin(u), 3);
                const y = 13 * Math.cos(u) - 5 * Math.cos(2 * u) - 2 * Math.cos(3 * u) - Math.cos(4 * u);
                const z = (Math.random() - 0.5) * 8 * (1 + Math.sin(v) * 0.5);

                const noiseX = (Math.random() - 0.5) * 2;
                const noiseY = (Math.random() - 0.5) * 2;
                const noiseZ = (Math.random() - 0.5) * 2;

                memoriesHeartPoints.push({
                    x: (x + noiseX) * heartScale * 0.5,
                    y: (y + noiseY) * heartScale * 0.5,
                    z: (z + noiseZ) * heartScale * 0.3
                });
            }

            // 创建粒子系统
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            const colorPalette = [
                new THREE.Color(0xff6b9d),
                new THREE.Color(0xff8a80),
                new THREE.Color(0xff4778),
                new THREE.Color(0xffc2d4),
                new THREE.Color(0xff69b4),
                new THREE.Color(0xffb6c1),
            ];

            for (let i = 0; i < particleCount; i++) {
                const point = memoriesHeartPoints[i];
                positions[i * 3] = point.x;
                positions[i * 3 + 1] = point.y;
                positions[i * 3 + 2] = point.z;

                const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: isMobile ? 3 : 2.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                sizeAttenuation: true,
                blending: THREE.AdditiveBlending
            });

            memoriesParticles = new THREE.Points(geometry, material);
            memoriesScene.add(memoriesParticles);

            // 事件监听
            setupMemoriesEventListeners();

            // 开始动画
            animateMemories();
        }

        function setupMemoriesEventListeners() {
            const canvas = memoriesRenderer.domElement;

            canvas.addEventListener('mousedown', onMemoriesDragStart);
            canvas.addEventListener('mousemove', onMemoriesDragMove);
            canvas.addEventListener('mouseup', onMemoriesDragEnd);
            canvas.addEventListener('mouseleave', onMemoriesDragEnd);

            canvas.addEventListener('touchstart', onMemoriesTouchStart, { passive: false });
            canvas.addEventListener('touchmove', onMemoriesTouchMove, { passive: false });
            canvas.addEventListener('touchend', onMemoriesDragEnd);

            window.addEventListener('resize', onMemoriesWindowResize);
        }

        function onMemoriesDragStart(e) {
            memoriesIsDragging = true;
            memoriesAutoRotate = false;
            clearTimeout(memoriesAutoRotateTimeout);
            memoriesPreviousMousePosition = { x: e.clientX, y: e.clientY };
        }

        function onMemoriesDragMove(e) {
            if (!memoriesIsDragging) return;

            const deltaX = e.clientX - memoriesPreviousMousePosition.x;
            const deltaY = e.clientY - memoriesPreviousMousePosition.y;

            memoriesTargetRotation.y += deltaX * 0.003;
            memoriesTargetRotation.x += deltaY * 0.003;
            memoriesTargetRotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, memoriesTargetRotation.x));

            memoriesPreviousMousePosition = { x: e.clientX, y: e.clientY };
        }

        function onMemoriesDragEnd() {
            memoriesIsDragging = false;
            memoriesAutoRotateTimeout = setTimeout(() => {
                memoriesAutoRotate = true;
            }, 3000);
        }

        function onMemoriesTouchStart(e) {
            if (e.touches.length === 1) {
                e.preventDefault();
                memoriesIsDragging = true;
                memoriesAutoRotate = false;
                clearTimeout(memoriesAutoRotateTimeout);
                memoriesPreviousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
        }

        function onMemoriesTouchMove(e) {
            if (!memoriesIsDragging || e.touches.length !== 1) return;
            e.preventDefault();

            const deltaX = e.touches[0].clientX - memoriesPreviousMousePosition.x;
            const deltaY = e.touches[0].clientY - memoriesPreviousMousePosition.y;

            memoriesTargetRotation.y += deltaX * 0.003;
            memoriesTargetRotation.x += deltaY * 0.003;
            memoriesTargetRotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, memoriesTargetRotation.x));

            memoriesPreviousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }

        function onMemoriesWindowResize() {
            memoriesCamera.aspect = window.innerWidth / window.innerHeight;
            memoriesCamera.updateProjectionMatrix();
            memoriesRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animateMemories() {
            if (state.stage !== 4) return;

            requestAnimationFrame(animateMemories);

            if (memoriesAutoRotate) {
                memoriesTargetRotation.y += 0.005;
            }

            memoriesCurrentRotation.x += (memoriesTargetRotation.x - memoriesCurrentRotation.x) * 0.08;
            memoriesCurrentRotation.y += (memoriesTargetRotation.y - memoriesCurrentRotation.y) * 0.08;

            memoriesParticles.rotation.x = memoriesCurrentRotation.x;
            memoriesParticles.rotation.y = memoriesCurrentRotation.y;
            memoriesParticles.position.y = Math.sin(Date.now() * 0.001) * 2;

            memoriesRenderer.render(memoriesScene, memoriesCamera);
        }

        function disposeMemories3D() {
            if (memoriesRenderer) {
                memoriesRenderer.dispose();
                const container = document.getElementById('memories-canvas-container');
                if (container && container.children[0]) {
                    container.removeChild(container.children[0]);
                }
            }
        }

        /* ============================================
           🔄 初始化
           ============================================ */
        function init() {
            createStars();
            createFloatingHearts();
            setupMainButton();
            setupThinkButton();
            setupYesButton();
            setupMemoriesButton();

            // 音乐按钮
            document.getElementById('music-toggle').addEventListener('click', toggleMusic);

            // 窗口大小改变时重置画布
            window.addEventListener('resize', () => {
                const canvas = document.getElementById('particle-canvas');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
