<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💗 给你的悄悄话 💗</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a3e">
    <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           🌟 全局样式 & CSS 变量
           ============================================ */
        :root {
            --primary-pink: #ff6b9d;
            --soft-pink: #ffc2d4;
            --deep-purple: #1a1a3e;
            --night-blue: #0f0f2d;
            --star-white: #fff8e7;
            --glow-pink: rgba(255, 107, 157, 0.6);
            --glow-purple: rgba(147, 112, 219, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Noto Sans SC', 'Mochiy Pop One', sans-serif;
            background: linear-gradient(135deg, #0f0f2d 0%, #1a1a3e 30%, #2d1b4e 60%, #1a1a3e 100%);
            overflow-x: hidden;
            position: relative;
        }

        /* ============================================
           🌌 星空背景
           ============================================ */
        .starry-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: var(--star-white);
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); box-shadow: 0 0 10px var(--star-white); }
        }

        /* ============================================
           💫 浮动爱心
           ============================================ */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            bottom: -50px;
            font-size: var(--size);
            animation: floatUp var(--duration) linear infinite;
            animation-delay: var(--delay);
            opacity: 0.6;
            filter: drop-shadow(0 0 5px var(--glow-pink));
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 0;
            }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% {
                transform: translateY(-110vh) rotate(360deg) scale(0.5);
                opacity: 0;
            }
        }

        /* ============================================
           🎆 爱心粒子爆炸画布
           ============================================ */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* ============================================
           🌸 主容器
           ============================================ */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: all 1s ease;
        }

        .container.brightened {
            background: radial-gradient(ellipse at center, rgba(255, 182, 193, 0.15) 0%, transparent 70%);
        }

        /* ============================================
           📝 开场文字 & 按钮容器
           ============================================ */
        .intro-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .intro-text {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            color: var(--soft-pink);
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 0 20px var(--glow-pink);
            animation: fadeInUp 1s ease forwards;
            opacity: 0;
            animation-delay: 0.5s;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ============================================
           💗 主按钮
           ============================================ */
         .main-btn {
            padding: 18px 45px;
            font-size: 1.3rem;
            font-weight: 500;
            color: white;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8a80 50%, #ff6b9d 100%);
            background-size: 200% 200%;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow:
                0 0 30px var(--glow-pink),
                0 0 60px rgba(255, 107, 157, 0.3),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
            animation: fadeInUp 1s ease forwards, pulse-glow 2s ease-in-out infinite;
            animation-delay: 0.8s, 1.8s;
            opacity: 0;
        }

        .main-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255, 255, 255, 0.3) 50%,
                transparent 70%
            );
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .main-btn:hover {
            transform: scale(1.1);
            box-shadow:
                0 0 50px var(--glow-pink),
                0 0 100px rgba(255, 107, 157, 0.4),
                inset 0 0 30px rgba(255, 255, 255, 0.3);
            background-position: 100% 100%;
        }

        .main-btn:hover::before {
            transform: translateX(100%);
        }

        .main-btn:active {
            transform: scale(0.95);
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 30px var(--glow-pink), 0 0 60px rgba(255, 107, 157, 0.3); }
            50% { box-shadow: 0 0 50px var(--glow-pink), 0 0 80px rgba(255, 107, 157, 0.5); }
        }

        /* ============================================
           💌 打字机文字区域
           ============================================ */
        .typewriter-container {
            text-align: center;
            margin: 30px 0;
            min-height: 150px;
        }

        .typewriter-text {
            font-size: clamp(1.3rem, 4vw, 2rem);
            color: white;
            text-shadow: 0 0 15px var(--glow-purple);
            margin: 15px 0;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .typewriter-text.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: var(--soft-pink);
            margin-left: 5px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* ============================================
           ❤️ 大爱心 & 表白核心区
           ============================================ */
        .confession-area {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeInUp 1s ease forwards;
        }

        .confession-area.visible {
            display: flex;
        }

        .big-heart {
            font-size: clamp(80px, 20vw, 150px);
            animation: heartbeat 1.2s ease-in-out infinite;
            filter: drop-shadow(0 0 30px var(--glow-pink));
            cursor: default;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.25); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }

        .confession-text {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: white;
            margin: 25px 0;
            text-shadow:
                0 0 20px var(--glow-pink),
                0 0 40px rgba(255, 107, 157, 0.4);
            text-align: center;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .answer-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 500;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .btn-yes {
            color: white;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff4778 100%);
            box-shadow:
                0 0 25px var(--glow-pink),
                0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-yes:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow:
                0 0 40px var(--glow-pink),
                0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .btn-think {
            color: white;
            background: linear-gradient(135deg, #9b7fcd 0%, #7a5fc9 100%);
            box-shadow:
                0 0 25px var(--glow-purple),
                0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-think:hover {
            transform: scale(1.05);
        }

        /* ============================================
           🎉 最终成功页面
           ============================================ */
        .final-area {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: transparent;
            border: none;
            outline: none;
            box-shadow: none;
        }

        .final-heart-rain {
            background: transparent;
            border: none;
        }

        .final-area.visible {
            display: flex;
            animation: fadeInUp 1.5s ease forwards;
        }

        .final-heart-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            overflow: hidden;
        }

        .falling-heart {
            position: absolute;
            top: -50px;
            font-size: var(--size);
            animation: fallHeart var(--duration) linear infinite;
            animation-delay: var(--delay);
        }

        @keyframes fallHeart {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0.3;
            }
        }

        .final-text {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: white;
            margin: 30px 0;
            text-shadow:
                0 0 30px var(--glow-pink),
                0 0 60px rgba(255, 107, 157, 0.5);
            animation: glow-pulse 2s ease-in-out infinite;
            z-index: 60;
            position: relative;
        }

        @keyframes glow-pulse {
            0%, 100% { text-shadow: 0 0 30px var(--glow-pink), 0 0 60px rgba(255, 107, 157, 0.5); }
            50% { text-shadow: 0 0 50px var(--glow-pink), 0 0 100px rgba(255, 107, 157, 0.7); }
        }

        /* ============================================
           🎵 音乐控制按钮
           ============================================ */
        .music-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.6), rgba(155, 127, 205, 0.6));
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 0 20px var(--glow-purple);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .music-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px var(--glow-pink);
        }

        .music-toggle.playing {
            animation: musicPulse 1s ease-in-out infinite;
        }

        @keyframes musicPulse {
            0%, 100% { box-shadow: 0 0 20px var(--glow-purple); }
            50% { box-shadow: 0 0 35px var(--glow-pink); }
        }

        /* ============================================
           ✨ 魔法光晕效果
           ============================================ */
        .magic-aura {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 107, 157, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            animation: auraBreath 4s ease-in-out infinite;
        }

        @keyframes auraBreath {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.8; }
        }

        /* ============================================
           🎀 隐藏元素
           ============================================ */
        .hidden {
            display: none !important;
        }

        .invisible {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* ============================================
           📱 移动端适配
           ============================================ */
        @media screen and (max-width: 768px) {
            body {
                min-height: 100vh;
                min-height: 100dvh;
                overflow-x: hidden;
                -webkit-overflow-scrolling: touch;
            }

            .container {
                padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }

            /* 主按钮 - 更大更易触摸 */
            .main-btn {
                padding: 20px 50px;
                font-size: 1.4rem;
                min-width: 200px;
                touch-action: manipulation;
            }

            /* 开场文字 */
            .intro-text {
                margin-bottom: 50px;
                padding: 0 20px;
                line-height: 1.8;
            }

            /* 打字机文字 */
            .typewriter-text {
                padding: 0 20px;
                line-height: 1.8;
            }

            .typewriter-container {
                min-height: 180px;
            }

            /* 大爱心 */
            .big-heart {
                font-size: clamp(70px, 25vw, 120px);
            }

            /* 表白文字 */
            .confession-text {
                padding: 0 25px;
                line-height: 1.8;
            }

            /* 按钮组 - 垂直排列更易点击 */
            .btn-group {
                flex-direction: column;
                gap: 20px;
                width: 100%;
                padding: 0 30px;
            }

            .answer-btn {
                width: 100%;
                padding: 18px 30px;
                font-size: 1.3rem;
                min-height: 56px;
                touch-action: manipulation;
            }

            .btn-think {
                position: static !important;
                left: auto !important;
                top: auto !important;
            }

            /* 最终文字 */
            .final-text {
                padding: 0 25px;
                line-height: 1.8;
            }

            /* 音乐按钮 - 更大更好点 */
            .music-toggle {
                width: 56px;
                height: 56px;
                font-size: 1.5rem;
                bottom: max(25px, env(safe-area-inset-bottom));
                right: 20px;
            }

            /* 浮动爱心减少一些避免性能问题 */
            .floating-heart {
                --duration: 12s;
            }

            /* 打字机光标适配 */
            .cursor {
                height: 1.4em;
            }
        }

        /* ============================================
           📱 小屏手机进一步优化
           ============================================ */
        @media screen and (max-width: 375px) {
            .main-btn {
                padding: 18px 40px;
                font-size: 1.2rem;
            }

            .confession-text {
                font-size: 1.3rem;
            }

            .btn-group {
                padding: 0 20px;
                gap: 15px;
            }

            .answer-btn {
                padding: 15px 25px;
                font-size: 1.2rem;
            }
        }

        /* ============================================
           📱 防止iOS双击缩放
           ============================================ */
        @media (hover: none) and (pointer: coarse) {
            .main-btn:active,
            .answer-btn:active {
                transform: scale(0.97);
            }
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="starry-bg" id="starry-bg"></div>

    <!-- 浮动爱心背景 -->
    <div class="floating-hearts" id="floating-hearts"></div>

    <!-- 魔法光晕 -->
    <div class="magic-aura"></div>

    <!-- 粒子爆炸画布 -->
    <canvas id="particle-canvas"></canvas>

    <!-- 主容器 -->
    <div class="container" id="main-container">
        <!-- 开场页面 -->
        <div class="intro-stage" id="intro-stage">
            <p class="intro-text">我有一件很重要的事想告诉你…</p>
            <button class="main-btn" id="main-btn">点我一下 💗</button>
        </div>

        <!-- 打字机文字区域 -->
        <div class="typewriter-container hidden" id="typewriter-container">
            <p class="typewriter-text" data-index="0"></p>
            <p class="typewriter-text" data-index="1"></p>
            <p class="typewriter-text" data-index="2"></p>
        </div>

        <!-- 表白核心区域 -->
        <div class="confession-area" id="confession-area">
            <div class="big-heart">💖</div>
            <p class="confession-text">你愿意做我的唯一吗？</p>
            <div class="btn-group">
                <button class="answer-btn btn-yes" id="btn-yes">愿意 💖</button>
                <button class="answer-btn btn-think" id="btn-think">再想想 😏</button>
            </div>
        </div>

        <!-- 最终成功页面 -->
        <div class="final-area" id="final-area">
            <div class="final-heart-rain" id="final-heart-rain"></div>
            <div class="big-heart" style="animation-delay: 0s;">💝</div>
            <p class="final-text">以后也想一直陪着你 🌙</p>
        </div>
    </div>

    <!-- 音乐控制 -->
    <button class="music-toggle" id="music-toggle" title="背景音乐">🎵</button>

    <!-- 背景音乐 (使用免费音乐URL) -->
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        /* ============================================
           🌟 配置 & 状态
           ============================================ */
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;

        const CONFIG = {
            starCount: isMobile ? 80 : 150,
            floatingHeartCount: isMobile ? 8 : 12,
            particleCount: isMobile ? 40 : 60,
            typingSpeed: 80,
            phrases: [
                '遇见你之后',
                '我的世界开始变得不一样了',
                '我开始期待每一天'
            ]
        };

        let state = {
            stage: 0, // 0: intro, 1: typing, 2: confession, 3: final
            musicPlaying: false
        };

        /* ============================================
           🌌 创建星空
           ============================================ */
        function createStars() {
            const container = document.getElementById('starry-bg');
            for (let i = 0; i < CONFIG.starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    --duration: ${Math.random() * 3 + 2}s;
                    --delay: ${Math.random() * 3}s;
                `;
                container.appendChild(star);
            }
        }

        /* ============================================
           💕 创建浮动爱心
           ============================================ */
        function createFloatingHearts() {
            const container = document.getElementById('floating-hearts');
            const hearts = ['💕', '💗', '💖', '💝', '✨', '🌸'];

            for (let i = 0; i < CONFIG.floatingHeartCount; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.cssText = `
                    left: ${Math.random() * 100}%;
                    --size: ${Math.random() * 20 + 15}px;
                    --duration: ${Math.random() * 8 + 6}s;
                    --delay: ${Math.random() * 10}s;
                `;
                container.appendChild(heart);
            }
        }

        /* ============================================
           🎆 爱心粒子爆炸效果
           ============================================ */
        class HeartParticleExplosion {
            constructor(x, y) {
                this.canvas = document.getElementById('particle-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.particles = [];
                this.init(x, y);
                this.animate();
            }

            init(x, y) {
                const colors = ['#ff6b9d', '#ff8a80', '#ff4778', '#ffc2d4', '#ff69b4', '#fff'];
                for (let i = 0; i < CONFIG.particleCount; i++) {
                    const angle = (Math.PI * 2 / CONFIG.particleCount) * i + Math.random() * 0.5;
                    const speed = Math.random() * 8 + 4;
                    const size = Math.random() * 15 + 8;
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        size: size,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        alpha: 1,
                        decay: Math.random() * 0.02 + 0.015,
                        rotation: Math.random() * Math.PI * 2,
                        rotationSpeed: (Math.random() - 0.5) * 0.3,
                        shape: Math.random() > 0.3 ? 'heart' : 'circle'
                    });
                }
            }

            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                let aliveCount = 0;
                this.particles.forEach(p => {
                    if (p.alpha <= 0) return;
                    aliveCount++;

                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.15; // 重力
                    p.alpha -= p.decay;
                    p.rotation += p.rotationSpeed;

                    this.ctx.save();
                    this.ctx.translate(p.x, p.y);
                    this.ctx.rotate(p.rotation);
                    this.ctx.globalAlpha = p.alpha;
                    this.ctx.fillStyle = p.color;
                    this.ctx.shadowColor = p.color;
                    this.ctx.shadowBlur = 10;

                    if (p.shape === 'heart') {
                        this.drawHeart(0, 0, p.size);
                    } else {
                        this.ctx.beginPath();
                        this.ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
                        this.ctx.fill();
                    }

                    this.ctx.restore();
                });

                if (aliveCount > 0) {
                    requestAnimationFrame(() => this.animate());
                } else {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                }
            }

            drawHeart(x, y, size) {
                const ctx = this.ctx;
                ctx.beginPath();
                const topCurveHeight = size * 0.3;
                ctx.moveTo(x, y + topCurveHeight);
                // 左半边
                ctx.bezierCurveTo(
                    x, y,
                    x - size / 2, y,
                    x - size / 2, y + topCurveHeight
                );
                ctx.bezierCurveTo(
                    x - size / 2, y + (size + topCurveHeight) / 2,
                    x, y + (size + topCurveHeight) / 2,
                    x, y + size
                );
                // 右半边
                ctx.bezierCurveTo(
                    x, y + (size + topCurveHeight) / 2,
                    x + size / 2, y + (size + topCurveHeight) / 2,
                    x + size / 2, y + topCurveHeight
                );
                ctx.bezierCurveTo(
                    x + size / 2, y,
                    x, y,
                    x, y + topCurveHeight
                );
                ctx.fill();
            }
        }

        /* ============================================
           ✍️ 打字机效果
           ============================================ */
        async function typeWriter(element, text) {
            element.classList.add('visible');
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            element.appendChild(cursor);

            for (let i = 0; i < text.length; i++) {
                const char = document.createTextNode(text[i]);
                element.insertBefore(char, cursor);
                await new Promise(resolve => setTimeout(resolve, CONFIG.typingSpeed));
            }

            setTimeout(() => cursor.remove(), 1000);
        }

        async function showTypewriterSequence() {
            const container = document.getElementById('typewriter-container');
            container.classList.remove('hidden');
            const texts = container.querySelectorAll('.typewriter-text');

            for (let i = 0; i < CONFIG.phrases.length; i++) {
                await new Promise(resolve => setTimeout(resolve, 500));
                await typeWriter(texts[i], CONFIG.phrases[i]);
                await new Promise(resolve => setTimeout(resolve, 800));
            }
        }

        /* ============================================
           🎉 最终爱心飘落
           ============================================ */
        function createFinalHeartRain() {
            const container = document.getElementById('final-heart-rain');
            const hearts = ['💖', '💕', '💗', '💝', '💘', '❤️', '🥰', '😍', '🤍', '💜'];

            for (let i = 0; i < 50; i++) {
                const heart = document.createElement('div');
                heart.className = 'falling-heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.cssText = `
                    left: ${Math.random() * 100}%;
                    --size: ${Math.random() * 30 + 20}px;
                    --duration: ${Math.random() * 4 + 3}s;
                    --delay: ${Math.random() * 5}s;
                `;
                container.appendChild(heart);
            }
        }

        /* ============================================
           🎵 音乐控制
           ============================================ */
        function toggleMusic() {
            const audio = document.getElementById('bg-music');
            const btn = document.getElementById('music-toggle');

            if (state.musicPlaying) {
                audio.pause();
                btn.classList.remove('playing');
                btn.textContent = '🎵';
            } else {
                audio.play().catch(() => {});
                btn.classList.add('playing');
                btn.textContent = '🔊';
            }
            state.musicPlaying = !state.musicPlaying;
        }

        /* ============================================
           🦊 "再想想"按钮逃跑效果
           ============================================ */
        function setupThinkButton() {
            const btn = document.getElementById('btn-think');
            const container = btn.parentElement;

            btn.addEventListener('mouseenter', () => {
                if (state.stage !== 2) return;

                const containerRect = container.getBoundingClientRect();
                const btnRect = btn.getBoundingClientRect();

                // 随机新位置
                const maxX = containerRect.width - btnRect.width;
                const maxY = 100;
                const newX = Math.random() * maxX;
                const newY = Math.random() * maxY;

                btn.style.position = 'relative';
                btn.style.left = newX + 'px';
                btn.style.top = newY + 'px';
            });

            // 点击也触发逃跑
            btn.addEventListener('click', (e) => {
                if (state.stage !== 2) return;
                e.preventDefault();

                const containerRect = container.getBoundingClientRect();
                const btnRect = btn.getBoundingClientRect();

                const maxX = containerRect.width - btnRect.width;
                const maxY = 100;
                const newX = Math.random() * maxX;
                const newY = Math.random() * maxY;

                btn.style.left = newX + 'px';
                btn.style.top = newY + 'px';
            });
        }

        /* ============================================
           🚀 主按钮点击 - 进入第二阶段
           ============================================ */
        function setupMainButton() {
            const btn = document.getElementById('main-btn');

            btn.addEventListener('click', (e) => {
                if (state.stage !== 0) return;
                state.stage = 1;

                // 获取按钮位置触发粒子爆炸
                const rect = btn.getBoundingClientRect();
                new HeartParticleExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2);

                // 按钮消失
                btn.classList.add('invisible');

                // 页面变亮
                document.getElementById('main-container').classList.add('brightened');

                // 开始打字机序列
                setTimeout(() => {
                    showTypewriterSequence().then(() => {
                        // 打字完成后显示表白区
                        setTimeout(() => {
                            state.stage = 2;
                            document.getElementById('typewriter-container').classList.add('hidden');
                            document.getElementById('confession-area').classList.add('visible');
                        }, 1500);
                    });
                }, 300);
            });
        }

        /* ============================================
           💖 愿意按钮
           ============================================ */
        function setupYesButton() {
            const btn = document.getElementById('btn-yes');

            btn.addEventListener('click', () => {
                if (state.stage !== 2) return;
                state.stage = 3;

                // 触发爱心爆炸
                const rect = btn.getBoundingClientRect();
                new HeartParticleExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2);

                // 隐藏表白区
                document.getElementById('confession-area').classList.remove('visible');

                // 创建最终爱心雨
                createFinalHeartRain();

                // 显示最终页面
                setTimeout(() => {
                    document.getElementById('final-area').classList.add('visible');
                    // 增强背景光晕
                    document.querySelector('.magic-aura').style.animation = 'auraBreath 2s ease-in-out infinite';
                    document.querySelector('.magic-aura').style.background = 'radial-gradient(circle, rgba(255, 107, 157, 0.5) 0%, transparent 70%)';
                }, 500);
            });
        }

        /* ============================================
           🔄 初始化
           ============================================ */
        function init() {
            createStars();
            createFloatingHearts();
            setupMainButton();
            setupThinkButton();
            setupYesButton();

            // 音乐按钮
            document.getElementById('music-toggle').addEventListener('click', toggleMusic);

            // 窗口大小改变时重置画布
            window.addEventListener('resize', () => {
                const canvas = document.getElementById('particle-canvas');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
