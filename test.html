<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌺 3D牡丹花</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a3e">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet"></noscript>
    <style>
        :root {
            --primary-pink: #ff6b9d;
            --soft-pink: #ffc2d4;
            --deep-purple: #1a1a3e;
            --night-blue: #0f0f2d;
            --glow-pink: rgba(255, 107, 157, 0.6);
            --glow-purple: rgba(147, 112, 219, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #0f0f2d 0%, #1a1a3e 30%, #2d1b4e 60%, #1a1a3e 100%);
            overflow: hidden;
            position: relative;
        }

        /* 星空背景 */
        .starry-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: #fff8e7;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
            will-change: opacity, transform;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 魔法光晕 */
        .magic-aura {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 107, 157, 0.25) 0%, rgba(147, 112, 219, 0.15) 50%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
            animation: auraBreath 5s ease-in-out infinite;
        }

        @keyframes auraBreath {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; }
        }

        /* 3D画布容器 */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        /* 提示文字 */
        .hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            color: var(--soft-pink);
            text-align: center;
            z-index: 100;
            text-shadow: 0 0 15px var(--glow-pink);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        @media screen and (max-width: 768px) {
            .magic-aura {
                width: 250px;
                height: 250px;
            }

            .star {
                animation: none;
                opacity: 0.6;
            }
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="starry-bg" id="starry-bg"></div>

    <!-- 魔法光晕 -->
    <div class="magic-aura"></div>

    <!-- 3D画布 -->
    <div id="canvas-container"></div>

    <!-- 提示 -->
    <p class="hint">🌺 拖动旋转 · 欣赏3D牡丹花</p>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        /* ============================================
           🌟 配置
           ============================================ */
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
        const particleCount = isMobile ? 3000 : 5000;

        /* ============================================
           🌌 创建星空
           ============================================ */
        function createStars() {
            const container = document.getElementById('starry-bg');
            const starCount = isMobile ? 60 : 100;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 1;
                star.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    --duration: ${Math.random() * 3 + 2}s;
                    --delay: ${Math.random() * 3}s;
                `;
                container.appendChild(star);
            }
        }

        /* ============================================
           💐 生成3D牡丹花粒子位置
           ============================================ */
        function generateFlowerPositions() {
            const points = [];
            const scale = isMobile ? 2.0 : 3.0; // 放大花朵

            // 牡丹花结构：多层花瓣 + 中心花蕊
            const centerCount = Math.floor(particleCount * 0.06);   // 中心花蕊
            const innerPetals = Math.floor(particleCount * 0.25);    // 内层花瓣
            const middlePetals = Math.floor(particleCount * 0.30);  // 中层花瓣
            const outerPetals = Math.floor(particleCount * 0.29);   // 外层花瓣
            const stemCount = Math.floor(particleCount * 0.07);      // 茎干
            const leafCount = particleCount - centerCount - innerPetals - middlePetals - outerPetals - stemCount;

            for (let i = 0; i < particleCount; i++) {
                let x, y, z;

                if (i < centerCount) {
                    // ===== 中心花蕊：金黄色密集点 =====
                    const t = i / centerCount;
                    const theta = t * Math.PI * 20;
                    const r = 0.25 * (1 - t * 0.7);

                    x = r * Math.cos(theta) * (1 + 0.3 * Math.sin(theta * 0.5));
                    y = 5.0 + t * 0.6;
                    z = r * Math.sin(theta) * 0.5;

                } else if (i < centerCount + innerPetals) {
                    // ===== 内层花瓣：紧密包裹的小花瓣 =====
                    const idx = i - centerCount;
                    const t = idx / innerPetals;
                    const petalCount = 8;
                    const petalIdx = Math.floor(t * petalCount);
                    const petalT = (t * petalCount) - petalIdx;

                    const baseAngle = (petalIdx / petalCount) * Math.PI * 2;
                    const theta = petalT * Math.PI * 1.2;

                    const r = 0.6 * Math.sin(theta) * (1 + petalT * 0.5);
                    const petalHeight = 0.15 * Math.sin(theta * 0.8);

                    x = r * Math.cos(baseAngle + theta * 0.15);
                    z = r * Math.sin(baseAngle + theta * 0.15);
                    y = 5.0 - petalT * 0.3 + petalHeight;

                    const thickness = 0.35 * (1 - petalT);
                    z += Math.cos(theta) * thickness;

                } else if (i < centerCount + innerPetals + middlePetals) {
                    // ===== 中层花瓣：展开的大花瓣 =====
                    const idx = i - centerCount - innerPetals;
                    const t = idx / middlePetals;
                    const petalCount = 10;
                    const petalIdx = Math.floor(t * petalCount);
                    const petalT = (t * petalCount) - petalIdx;

                    const baseAngle = (petalIdx / petalCount) * Math.PI * 2;
                    const theta = petalT * Math.PI * 1.5;

                    const r = 1.2 * Math.sin(theta) * (1 + petalT * 0.4);
                    const petalHeight = 0.3 * Math.sin(theta * 0.6);

                    x = r * Math.cos(baseAngle + theta * 0.1);
                    z = r * Math.sin(baseAngle + theta * 0.1);
                    y = 4.8 - petalT * 0.8 + petalHeight;

                    const thickness = 0.5 * (1 - petalT);
                    z += Math.cos(theta) * thickness;

                } else if (i < centerCount + innerPetals + middlePetals + outerPetals) {
                    // ===== 外层花瓣：最大最展开，形成轮廓 =====
                    const idx = i - centerCount - innerPetals - middlePetals;
                    const t = idx / outerPetals;
                    const petalCount = 12;
                    const petalIdx = Math.floor(t * petalCount);
                    const petalT = (t * petalCount) - petalIdx;

                    const baseAngle = (petalIdx / petalCount) * Math.PI * 2;
                    const theta = petalT * Math.PI * 1.8;

                    const r = 1.8 + petalT * 1.2;
                    const petalShape = Math.sin(theta);

                    x = r * petalShape * Math.cos(baseAngle);
                    z = r * petalShape * Math.sin(baseAngle);
                    y = 4.5 - petalT * 1.5;

                    // 边缘轻微上翘
                    const edgeCurl = petalT * 0.2;
                    y += edgeCurl * Math.sin(theta) * Math.abs(Math.cos(theta));

                    const thickness = 0.4 * (1 - petalT * 0.7);
                    z += Math.cos(theta) * thickness;

                } else if (i < centerCount + innerPetals + middlePetals + outerPetals + stemCount) {
                    // ===== 茎干：粗壮垂直圆柱 =====
                    const idx = i - centerCount - innerPetals - middlePetals - outerPetals;
                    const t = idx / stemCount;
                    const angle = t * Math.PI * 8;
                    const radius = 0.12; // 较粗的茎

                    x = radius * Math.cos(angle);
                    y = 3.0 - t * 8;
                    z = radius * Math.sin(angle);

                } else {
                    // ===== 叶子：大型牡丹叶 =====
                    const idx = i - centerCount - innerPetals - middlePetals - outerPetals - stemCount;
                    const t = idx / leafCount;
                    const leafIdx = t < 0.5 ? 0 : 1;
                    const leafT = leafIdx === 0 ? t * 2 : (t - 0.5) * 2;

                    const baseAngle = leafIdx === 0 ? Math.PI * 0.4 : Math.PI * 1.6;
                    const theta = leafT * Math.PI;

                    const leafR = 2.0 * Math.sin(theta);
                    const leafWidth = 1 - Math.pow(leafT - 0.5, 2) * 0.4;

                    x = leafR * leafWidth * Math.cos(baseAngle) * 1.8;
                    z = leafR * leafWidth * Math.sin(baseAngle) * 0.9;
                    y = 0.5 - leafIdx * 1.5 - leafT * 1.0;

                    z += Math.sin(theta) * 0.4 * (leafIdx === 0 ? 1 : -1);
                }

                points.push({ x: x * scale, y: y * scale, z: z * scale });
            }

            return points;
        }

        /* ============================================
           🌟 Three.js 3D 场景
           ============================================ */
        let scene, camera, renderer, particles, flowerPositions;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let targetRotation = { x: 0, y: 0 };
        let currentRotation = { x: 0, y: 0 };
        let autoRotate = true;

        function init() {
            createStars();

            flowerPositions = generateFlowerPositions();

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = isMobile ? 80 : 100;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            createParticles();
            setupEventListeners();
            animate();
        }

        function createParticles() {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            // 牡丹花颜色：内深粉、中粉、外浅粉、中心金黄
            const deepPink = new THREE.Color(0xff4778);
            const midPink = new THREE.Color(0xff6b9d);
            const lightPink = new THREE.Color(0xffb6c1);
            const palePink = new THREE.Color(0xffd1dc);
            const goldYellow = new THREE.Color(0xffd700); // 中心金黄色
            const stemGreen = new THREE.Color(0x4CAF50);
            const lightGreen = new THREE.Color(0x81C784);

            const centerCount = Math.floor(particleCount * 0.06);
            const innerPetals = Math.floor(particleCount * 0.25);
            const middlePetals = Math.floor(particleCount * 0.30);
            const outerPetals = Math.floor(particleCount * 0.29);
            const stemCount = Math.floor(particleCount * 0.07);
            const leafCount = particleCount - centerCount - innerPetals - middlePetals - outerPetals - stemCount;

            for (let i = 0; i < particleCount; i++) {
                const pos = flowerPositions[i];
                positions[i * 3] = pos.x;
                positions[i * 3 + 1] = pos.y;
                positions[i * 3 + 2] = pos.z;

                let color;
                if (i < centerCount) {
                    // 中心花蕊：金黄色
                    color = goldYellow;
                } else if (i < centerCount + innerPetals) {
                    // 内层花瓣：深粉
                    const t = (i - centerCount) / innerPetals;
                    color = deepPink.clone().lerp(midPink, t);
                } else if (i < centerCount + innerPetals + middlePetals) {
                    // 中层花瓣：中粉
                    const t = (i - centerCount - innerPetals) / middlePetals;
                    color = midPink.clone().lerp(lightPink, t);
                } else if (i < centerCount + innerPetals + middlePetals + outerPetals) {
                    // 外层花瓣：浅粉
                    const t = (i - centerCount - innerPetals - middlePetals) / outerPetals;
                    color = lightPink.clone().lerp(palePink, t);
                } else if (i < centerCount + innerPetals + middlePetals + outerPetals + stemCount) {
                    // 茎干：绿色
                    color = stemGreen;
                } else {
                    // 叶子：绿色渐变
                    color = stemGreen.clone().lerp(lightGreen, (i - centerCount - innerPetals - middlePetals - outerPetals - stemCount) / leafCount);
                }

                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: isMobile ? 2.5 : 2,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                sizeAttenuation: true,
                blending: THREE.AdditiveBlending
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function setupEventListeners() {
            const canvas = renderer.domElement;

            canvas.addEventListener('mousedown', onDragStart);
            canvas.addEventListener('mousemove', onDragMove);
            canvas.addEventListener('mouseup', onDragEnd);
            canvas.addEventListener('mouseleave', onDragEnd);

            canvas.addEventListener('touchstart', onTouchStart, { passive: false });
            canvas.addEventListener('touchmove', onTouchMove, { passive: false });
            canvas.addEventListener('touchend', onDragEnd);

            window.addEventListener('resize', onWindowResize);
        }

        function onDragStart(e) {
            isDragging = true;
            autoRotate = false;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        }

        function onDragMove(e) {
            if (!isDragging) return;

            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;

            targetRotation.y += deltaX * 0.005;
            targetRotation.x += deltaY * 0.005;
            targetRotation.x = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, targetRotation.x));

            previousMousePosition = { x: e.clientX, y: e.clientY };
        }

        function onDragEnd() {
            isDragging = false;
            setTimeout(() => { autoRotate = true; }, 3000);
        }

        function onTouchStart(e) {
            if (e.touches.length === 1) {
                e.preventDefault();
                isDragging = true;
                autoRotate = false;
                previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
        }

        function onTouchMove(e) {
            if (!isDragging || e.touches.length !== 1) return;
            e.preventDefault();

            const deltaX = e.touches[0].clientX - previousMousePosition.x;
            const deltaY = e.touches[0].clientY - previousMousePosition.y;

            targetRotation.y += deltaX * 0.005;
            targetRotation.x += deltaY * 0.005;
            targetRotation.x = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, targetRotation.x));

            previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (autoRotate) {
                targetRotation.y += 0.003;
            }

            currentRotation.x += (targetRotation.x - currentRotation.x) * 0.08;
            currentRotation.y += (targetRotation.y - currentRotation.y) * 0.08;

            particles.rotation.x = currentRotation.x;
            particles.rotation.y = currentRotation.y;
            particles.position.y = Math.sin(Date.now() * 0.001) * 1.5;

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
